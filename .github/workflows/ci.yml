name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tooling:
    name: Tooling checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rokit
        env:
          GITHUB_PAT: ${{ github.token }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/rojo-rbx/rokit/v1.2.0/scripts/install.sh | bash
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"

      - name: Trust pinned tools
        run: |
          rokit trust rojo-rbx/rojo UpliftGames/wally Kampfkarren/selene JohnnyMorganz/StyLua lune-org/lune

      - name: Install pinned tools
        run: rokit install

      - name: Print tool versions
        run: lune run scripts/tooling-doctor.luau

      - name: Validate Wally manifest
        run: wally manifest-to-json > /dev/null

      - name: Check formatting
        run: stylua --check src scripts

      - name: Run static analysis
        run: selene src scripts

      - name: Build Rojo place artifact
        run: |
          mkdir -p build
          rojo build default.project.json -o build/FreezeTagCircle.rbxlx

      - name: Upload Rojo build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreezeTagCircle-rbxlx
          path: build/FreezeTagCircle.rbxlx

