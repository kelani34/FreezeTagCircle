name: Bug
description: Report a broken behavior or regression.
title: "[Bug]: "
labels:
  - type:bug
  - status:ready
body:
  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Include Studio, server count, branch, and exact steps.
    validations:
      required: true

